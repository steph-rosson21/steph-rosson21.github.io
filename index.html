<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stephanie Rosson</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

    :root {
      --navy:   #1B1C57;
      --green:  #00C385;
      --muted:  #6B6E8F;
      --rule:   #E4E2DA;
      --bg:     #F7F4EE;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      color: var(--navy);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .card {
      text-align: center;
      max-width: 460px;
    }

    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      object-position: center top;
      margin: 0 auto 28px;
      display: block;
      box-shadow: 0 0 0 1.5px var(--rule), 0 10px 30px rgba(27,28,87,0.13);
    }

    .name {
      font-size: clamp(34px, 6vw, 50px);
      font-weight: 600;
      line-height: 1.05;
      letter-spacing: -0.02em;
      color: var(--navy);
    }

    .title {
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 14px;
      margin-bottom: 34px;
    }

    .links {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      text-decoration: none;
      transition: all 0.18s;
    }
    .btn-solid {
      background: var(--navy);
      color: #fff;
    }
    .btn-solid:hover { background: #0f1040; transform: translateY(-1px); }
    .btn-ghost {
      background: transparent;
      color: var(--navy);
      border: 1px solid var(--rule);
    }
    .btn-ghost:hover { border-color: var(--green); color: var(--green); transform: translateY(-1px); }
  </style>
</head>
<body>

  <div class="card">
    <img class="avatar" src="photo.jpeg" alt="Stephanie Rosson" />
    <h1 class="name">Stephanie Rosson</h1>
    <p class="title">Director of Program Operations &nbsp;·&nbsp; CodePath</p>

    <div class="links">
      <a class="btn btn-solid" href="https://www.linkedin.com/in/stephanie-rosson/" target="_blank">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-4 0v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
        LinkedIn
      </a>
      <a class="btn btn-ghost" href="mailto:stephbautista21@gmail.com">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        Get in touch
      </a>
    </div>
  </div>

</body>
</html>
